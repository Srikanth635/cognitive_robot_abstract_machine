<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Terminal - Interactive Visualizer</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Color Palette - Data Terminal Theme */
            --bg-primary: #0a0e14;
            --bg-secondary: #0f1419;
            --bg-tertiary: #151a21;
            --bg-input: #1a1f28;
            
            --border: #1f2430;
            --border-active: #2a3140;
            
            --text-primary: #e6eef7;
            --text-secondary: #95a3b3;
            --text-muted: #6b7785;
            
            /* Neon Accents */
            --accent-cyan: #00e5ff;
            --accent-pink: #ff0080;
            --accent-purple: #a855f7;
            --accent-green: #00ff9f;
            
            /* JSON Syntax Colors */
            --json-key: #00ff9f;
            --json-string: #00d4ff;
            --json-number: #ff0080;
            --json-boolean: #ffaa00;
            --json-null: #95a3b3;
            
            --shadow-glow: rgba(0, 229, 255, 0.15);
            --shadow-dark: rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'IBM Plex Mono', 'Fira Code', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated background effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 229, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 128, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Tab Navigation */
        .tab-container {
            position: relative;
            z-index: 10;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 60px;
        }

        .app-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.25rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-right: 3rem;
            letter-spacing: -0.02em;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
        }

        .tab {
            position: relative;
            padding: 0.625rem 1.5rem;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
        }

        .tab:hover {
            color: var(--accent-cyan);
            background: rgba(0, 229, 255, 0.05);
        }

        .tab.active {
            color: var(--accent-cyan);
            background: rgba(0, 229, 255, 0.1);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px var(--shadow-glow);
        }

        /* Main Layout */
        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            height: calc(100vh - 60px);
        }

        /* Left Panel - Input */
        .left-panel {
            width: 40%;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .left-panel::after {
            content: '';
            position: absolute;
            top: 0;
            right: -1px;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, 
                transparent 0%, 
                var(--accent-cyan) 50%, 
                transparent 100%);
            opacity: 0.3;
        }

        .panel-header {
            padding: 2rem 2rem 1rem 2rem;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .panel-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .input-section {
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .input-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        .input-textarea {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text-primary);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            resize: vertical;
            min-height: 200px;
            transition: all 0.3s ease;
        }

        .input-textarea:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.1),
                        0 0 20px var(--shadow-glow);
        }

        .input-textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
        }

        .button-group {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.875rem 2rem;
            border: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: var(--bg-primary);
            box-shadow: 0 4px 20px rgba(0, 229, 255, 0.3);
            flex: 1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 229, 255, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-input);
            color: var(--text-primary);
            border-color: var(--border-active);
        }

        /* Status Messages */
        .status-container {
            min-height: 60px;
            padding: 1rem 2rem;
            border-top: 1px solid var(--border);
        }

        .status-message {
            padding: 0.875rem 1.25rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .status-message.show {
            display: block;
        }

        .status-success {
            background: rgba(0, 255, 159, 0.1);
            border: 1px solid rgba(0, 255, 159, 0.3);
            color: var(--accent-green);
        }

        .status-error {
            background: rgba(255, 0, 128, 0.1);
            border: 1px solid rgba(255, 0, 128, 0.3);
            color: var(--accent-pink);
        }

        .status-loading {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: var(--accent-cyan);
        }

        /* Right Panel - Visualization */
        .right-panel {
            flex: 1;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .viz-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .viz-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .viz-controls {
            display: flex;
            gap: 0.75rem;
        }

        .viz-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .viz-btn:hover {
            background: var(--bg-input);
            color: var(--accent-cyan);
            border-color: var(--accent-cyan);
        }

        .viz-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            gap: 1rem;
        }

        .empty-state-icon {
            font-size: 4rem;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: 1.125rem;
            font-weight: 500;
        }

        /* JSON Viewer Styles */
        .json-viewer {
            font-size: 0.875rem;
            display: none;
        }

        .json-viewer.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .json-item {
            margin-left: 1.5rem;
            position: relative;
        }

        .json-line {
            display: flex;
            align-items: flex-start;
            padding: 0.25rem 0;
            position: relative;
            transition: background 0.15s ease;
            border-radius: 4px;
        }

        .json-line:hover {
            background: rgba(0, 229, 255, 0.05);
        }

        .toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            margin-right: 0.5rem;
            cursor: pointer;
            color: var(--text-muted);
            user-select: none;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .toggle:hover {
            color: var(--accent-cyan);
            transform: scale(1.1);
        }

        .toggle::before {
            content: '▶';
            font-size: 10px;
            transition: transform 0.2s ease;
        }

        .toggle.expanded::before {
            transform: rotate(90deg);
        }

        .toggle.empty {
            opacity: 0;
            pointer-events: none;
        }

        .json-nested {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .json-nested.expanded {
            max-height: 10000px;
            opacity: 1;
        }

        .json-key {
            color: var(--json-key);
            font-weight: 500;
        }

        .json-string {
            color: var(--json-string);
            word-wrap: break-word;
        }

        .json-number {
            color: var(--json-number);
        }

        .json-boolean {
            color: var(--json-boolean);
            font-weight: 500;
        }

        .json-null {
            color: var(--json-null);
            font-style: italic;
        }

        .bracket {
            color: var(--text-secondary);
            font-weight: 600;
        }

        .colon {
            color: var(--text-muted);
            margin: 0 0.25rem;
        }

        .comma {
            color: var(--text-muted);
        }

        .count-badge {
            display: inline-block;
            background: var(--bg-tertiary);
            color: var(--text-muted);
            font-size: 0.7rem;
            padding: 0.125rem 0.5rem;
            border-radius: 10px;
            margin-left: 0.5rem;
            border: 1px solid var(--border);
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-cyan);
        }

        /* Animations */
        @keyframes slideIn {
            from {
                transform: translateY(-10px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Tab Navigation -->
    <div class="tab-container">
        <div class="app-title"></div>
        <div class="tabs">
            <div class="tab active" data-tab="visualizer">Action Representation</div>
            <!-- Add more tabs here as needed -->
        </div>
    </div>

    <!-- Main Split View Container -->
    <div class="main-container">
        <!-- Left Panel: Input -->
        <div class="left-panel">
            <div class="panel-header">
                <h2 class="panel-title">Generate Symbolic Actions</h2>
                <p class="panel-subtitle">Enter instruction to create and visualize action data structures</p>
            </div>

            <div class="input-section">
                <div class="input-group">
                    <label class="input-label">Instruction</label>
                    <textarea 
                        id="instructionInput" 
                        class="input-textarea" 
                        placeholder="Enter Instruction"
                    ></textarea>
                </div>

                <div class="button-group">
                    <button class="btn btn-primary" id="generateBtn">
                        Generate Data
                    </button>
                    <button class="btn btn-secondary" id="clearBtn">
                        Clear
                    </button>
                </div>
            </div>

            <div class="status-container">
                <div id="statusMessage" class="status-message"></div>
            </div>
        </div>

        <!-- Right Panel: Visualization -->
        <div class="right-panel">
            <div class="viz-header">
                <h2 class="viz-title">Symbolic Action Hierarchy</h2>
                <div class="viz-controls">
                    <button class="viz-btn" id="expandAllBtn">Expand All</button>
                    <button class="viz-btn" id="collapseAllBtn">Collapse All</button>
                </div>
            </div>

            <div class="viz-content">
                <!-- Empty State -->
                <div id="emptyState" class="empty-state">
                    <div class="empty-state-icon">{ }</div>
                    <div class="empty-state-text">No data to display yet</div>
                    <div class="panel-subtitle">Enter an instruction and generate data to begin</div>
                </div>

                <!-- JSON Viewer Container -->
                <div id="jsonViewer" class="json-viewer"></div>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let currentData = null;

        // DOM Elements
        const instructionInput = document.getElementById('instructionInput');
        const generateBtn = document.getElementById('generateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusMessage = document.getElementById('statusMessage');
        const emptyState = document.getElementById('emptyState');
        const jsonViewer = document.getElementById('jsonViewer');
        const expandAllBtn = document.getElementById('expandAllBtn');
        const collapseAllBtn = document.getElementById('collapseAllBtn');

        // Show status message
        function showStatus(message, type = 'loading') {
            statusMessage.textContent = message;
            statusMessage.className = `status-message status-${type} show`;
            
            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    statusMessage.classList.remove('show');
                }, 3000);
            }
        }

        // Generate Data
        async function generateData() {
            const instruction = instructionInput.value.trim();
            
            if (!instruction) {
                showStatus('Please enter an instruction', 'error');
                return;
            }

            try {
                generateBtn.disabled = true;
                generateBtn.innerHTML = '<span class="spinner"></span> Generating...';
                showStatus('Generating data...', 'loading');

                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ instruction })
                });

                const result = await response.json();

                if (result.success) {
                    currentData = result.data;
                    renderJson(currentData);
                    showStatus('Data generated successfully!', 'success');
                } else {
                    throw new Error(result.error || 'Failed to generate data');
                }

            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
                console.error('Generation error:', error);
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = 'Generate Data';
            }
        }

        // Clear Everything
        function clearAll() {
            instructionInput.value = '';
            currentData = null;
            jsonViewer.innerHTML = '';
            jsonViewer.classList.remove('active');
            emptyState.style.display = 'flex';
            statusMessage.classList.remove('show');
        }

        // JSON Viewer Functions
        function createJsonElement(key, value, isLast = false, depth = 0) {
            const item = document.createElement('div');
            item.className = 'json-item';

            const line = document.createElement('div');
            line.className = 'json-line';

            const isExpandable = (typeof value === 'object' && value !== null && 
                                 (Array.isArray(value) ? value.length > 0 : Object.keys(value).length > 0));

            const toggle = document.createElement('span');
            toggle.className = `toggle ${isExpandable ? '' : 'empty'}`;

            const content = document.createElement('span');

            if (key !== null) {
                const keySpan = document.createElement('span');
                keySpan.className = 'json-key';
                keySpan.textContent = `"${key}"`;
                content.appendChild(keySpan);

                const colon = document.createElement('span');
                colon.className = 'colon';
                colon.textContent = ':';
                content.appendChild(colon);
            }

            if (Array.isArray(value)) {
                const bracket = document.createElement('span');
                bracket.className = 'bracket';
                bracket.textContent = '[';
                content.appendChild(bracket);

                if (value.length > 0) {
                    const badge = document.createElement('span');
                    badge.className = 'count-badge';
                    badge.textContent = `${value.length} items`;
                    content.appendChild(badge);
                }
            } else if (typeof value === 'object' && value !== null) {
                const bracket = document.createElement('span');
                bracket.className = 'bracket';
                bracket.textContent = '{';
                content.appendChild(bracket);

                const count = Object.keys(value).length;
                if (count > 0) {
                    const badge = document.createElement('span');
                    badge.className = 'count-badge';
                    badge.textContent = `${count} keys`;
                    content.appendChild(badge);
                }
            } else {
                const valueSpan = document.createElement('span');
                if (typeof value === 'string') {
                    valueSpan.className = 'json-string';
                    valueSpan.textContent = `"${value}"`;
                } else if (typeof value === 'number') {
                    valueSpan.className = 'json-number';
                    valueSpan.textContent = value;
                } else if (typeof value === 'boolean') {
                    valueSpan.className = 'json-boolean';
                    valueSpan.textContent = value;
                } else if (value === null) {
                    valueSpan.className = 'json-null';
                    valueSpan.textContent = 'null';
                }
                content.appendChild(valueSpan);
            }

            if (!isLast && key !== null) {
                const comma = document.createElement('span');
                comma.className = 'comma';
                comma.textContent = ',';
                content.appendChild(comma);
            }

            line.appendChild(toggle);
            line.appendChild(content);
            item.appendChild(line);

            if (isExpandable) {
                const nested = document.createElement('div');
                nested.className = 'json-nested';

                if (Array.isArray(value)) {
                    value.forEach((item, index) => {
                        nested.appendChild(createJsonElement(null, item, index === value.length - 1, depth + 1));
                    });

                    const closeLine = document.createElement('div');
                    closeLine.className = 'json-line';
                    const closeBracket = document.createElement('span');
                    closeBracket.className = 'bracket';
                    closeBracket.textContent = ']';
                    if (!isLast) {
                        const comma = document.createElement('span');
                        comma.className = 'comma';
                        comma.textContent = ',';
                        closeBracket.appendChild(comma);
                    }
                    closeLine.appendChild(closeBracket);
                    nested.appendChild(closeLine);
                } else {
                    const entries = Object.entries(value);
                    entries.forEach(([k, v], index) => {
                        nested.appendChild(createJsonElement(k, v, index === entries.length - 1, depth + 1));
                    });

                    const closeLine = document.createElement('div');
                    closeLine.className = 'json-line';
                    const closeBracket = document.createElement('span');
                    closeBracket.className = 'bracket';
                    closeBracket.textContent = '}';
                    if (!isLast) {
                        const comma = document.createElement('span');
                        comma.className = 'comma';
                        comma.textContent = ',';
                        closeBracket.appendChild(comma);
                    }
                    closeLine.appendChild(closeBracket);
                    nested.appendChild(closeLine);
                }

                item.appendChild(nested);

                toggle.addEventListener('click', () => {
                    toggle.classList.toggle('expanded');
                    nested.classList.toggle('expanded');
                });
            }

            return item;
        }

        function renderJson(data) {
            jsonViewer.innerHTML = '';
            emptyState.style.display = 'none';
            jsonViewer.classList.add('active');

            const root = document.createElement('div');
            root.className = 'json-item';

            if (typeof data === 'object' && data !== null) {
                if (Array.isArray(data)) {
                    const openBracket = document.createElement('div');
                    openBracket.className = 'json-line';
                    openBracket.innerHTML = '<span class="bracket">[</span>';
                    root.appendChild(openBracket);

                    data.forEach((item, index) => {
                        root.appendChild(createJsonElement(null, item, index === data.length - 1, 0));
                    });

                    const closeBracket = document.createElement('div');
                    closeBracket.className = 'json-line';
                    closeBracket.innerHTML = '<span class="bracket">]</span>';
                    root.appendChild(closeBracket);
                } else {
                    const openBracket = document.createElement('div');
                    openBracket.className = 'json-line';
                    openBracket.innerHTML = '<span class="bracket">{</span>';
                    root.appendChild(openBracket);

                    const entries = Object.entries(data);
                    entries.forEach(([key, value], index) => {
                        root.appendChild(createJsonElement(key, value, index === entries.length - 1, 0));
                    });

                    const closeBracket = document.createElement('div');
                    closeBracket.className = 'json-line';
                    closeBracket.innerHTML = '<span class="bracket">}</span>';
                    root.appendChild(closeBracket);
                }
            }

            jsonViewer.appendChild(root);
        }

        function expandAll() {
            document.querySelectorAll('.toggle:not(.empty)').forEach(toggle => {
                toggle.classList.add('expanded');
            });
            document.querySelectorAll('.json-nested').forEach(nested => {
                nested.classList.add('expanded');
            });
        }

        function collapseAll() {
            document.querySelectorAll('.toggle').forEach(toggle => {
                toggle.classList.remove('expanded');
            });
            document.querySelectorAll('.json-nested').forEach(nested => {
                nested.classList.remove('expanded');
            });
        }

        // Event Listeners
        generateBtn.addEventListener('click', generateData);
        clearBtn.addEventListener('click', clearAll);
        expandAllBtn.addEventListener('click', expandAll);
        collapseAllBtn.addEventListener('click', collapseAll);

        // Allow Enter key to generate (with Shift+Enter for new line)
        instructionInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generateData();
            }
        });

        // Initialize
        console.log('Data Terminal initialized');
    </script>
</body>
</html>
